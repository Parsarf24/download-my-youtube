name: Download YouTube Videos

on:
  workflow_dispatch:
  push:
    paths:
      - 'links.txt'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Make videos folder
        run: mkdir -p videos

      - name: Download videos
        run: |
          while read url; do
            yt-dlp \
              -f mp4 \
              -o "videos/%(title)s.%(ext)s" \
              "$url"
          done < links.txt

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add videos

          git commit -m "Downloaded videos" || echo "Nothing to commit"

          git push
